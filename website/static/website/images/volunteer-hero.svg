    <path d="M14 38 Q50 0 86 38 Q82 80 50 74 Q18 80 14 38" fill="#2d1810"/>
    <rect x="28" y="92" width="44" height="72" rx="10" fill="#1e3a8a"/>
    <rect x="20" y="100" width="18" height="55" rx="8" fill="#d4a574" transform="rotate(14 29 100)"/>
    <rect x="62" y="100" width="18" height="55" rx="8" fill="#d4a574" transform="rotate(-10 71 100)"/>
    <rect x="35" y="164" width="14" height="55" rx="5" fill="#1f2937"/>
    <rect x="51" y="164" width="14" height="55" rx="5" fill="#1f2937"/>
  </g>
  <!-- Child -->
  <g filter="url(#volShadow)" transform="translate(530, 195)">
    <circle cx="42" cy="42" r="34" fill="#fcd9b6"/>
    <path d="M14 32 Q42 6 70 32 Q66 66 42 60 Q18 66 14 32" fill="#5c3d2e"/>
    <rect x="24" y="76" width="36" height="52" rx="8" fill="#f59e0b"/>
    <rect x="58" y="88" width="18" height="10" rx="4" fill="#fcd9b6"/>
    <rect x="28" y="128" width="12" height="42" rx="4" fill="#374151"/>
    <rect x="44" y="128" width="12" height="42" rx="4" fill="#374151"/>
  </g>
  <!-- Woman -->
  <g filter="url(#volShadow)" transform="translate(660, 130)">
    <circle cx="52" cy="54" r="42" fill="#e8b89a"/>
    <path d="M14 40 Q52 0 90 40 Q86 84 52 78 Q18 84 14 40" fill="#3d2314"/>
    <path d="M26 92 Q52 78 78 92 L72 164 Q52 172 32 164 Z" fill="#7c3aed"/>
    <rect x="78" y="100" width="18" height="10" rx="4" fill="#e8b89a"/>
    <rect x="30" y="164" width="15" height="58" rx="5" fill="#374151"/>
    <rect x="59" y="164" width="15" height="58" rx="5" fill="#374151"/>
  </g>
</svg>
