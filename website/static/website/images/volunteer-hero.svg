<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="volHeroBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="50%" stop-color="#4da6a9"/>
      <stop offset="100%" stop-color="#3d8f92"/>
    </linearGradient>
    <filter id="volShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1200" height="480" fill="url(#volHeroBg)"/>
  <ellipse cx="150" cy="420" rx="130" ry="55" fill="#22c55e" opacity="0.35"/>
  <ellipse cx="1050" cy="400" rx="150" ry="60" fill="#16a34a" opacity="0.3"/>
  <ellipse cx="600" cy="450" rx="220" ry="45" fill="#15803d" opacity="0.2"/>
  <circle cx="180" cy="100" r="55" fill="#fbbf24" opacity="0.2"/>
  <!-- foliage accents -->
  <ellipse cx="350" cy="380" rx="35" ry="20" fill="#4ade80" opacity="0.6" transform="rotate(-30 350 380)"/>
  <ellipse cx="850" cy="360" rx="40" ry="22" fill="#86efac" opacity="0.55" transform="rotate(25 850 360)"/>
  <ellipse cx="600" cy="455" rx="380" ry="25" fill="rgba(0,0,0,0.08)"/>
  <!-- Man -->
  <g filter="url(#volShadow)" transform="translate(380, 140)">
