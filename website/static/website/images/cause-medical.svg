<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="medBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#medBg)"/>
  <!-- 3D blocks -->
  <g transform="translate(80, 70)">
    <rect x="0" y="20" width="70" height="70" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" transform="rotate(-8 35 55)"/>
    <rect x="90" y="0" width="70" height="70" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="180" y="30" width="70" height="70" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2" transform="rotate(10 215 65)"/>
    <rect x="50" y="100" width="60" height="60" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="140" y="110" width="60" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" transform="rotate(-5 170 140)"/>
  </g>
  <!-- medical cross -->
  <circle cx="200" cy="155" r="28" fill="#fff" stroke="#fecaca" stroke-width="3"/>
  <rect x="186" y="143" width="28" height="8" rx="2" fill="#ef4444"/>
  <rect x="196" y="133" width="8" height="28" rx="2" fill="#ef4444"/>
  <!-- stethoscope hint -->
  <path d="M300 200 Q320 170 340 195 Q350 215 330 225" stroke="#64748b" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="328" cy="228" r="7" fill="none" stroke="#64748b" stroke-width="2.5"/>
</svg>
